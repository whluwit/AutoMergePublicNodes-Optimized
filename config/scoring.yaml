# Node scoring configuration
# The real proxy test decides whether a node is usable. These weights only rank usable nodes.

weights:
  latency: 25
  jitter: 15
  tcp: 10
  speed: 10
  fingerprint_resistance: 5
  protocol_history: 15
  source_history: 20

thresholds:
  excellent_latency_ms: 120
  bad_latency_ms: 1200
  bad_jitter_ms: 400
  excellent_tcp_latency_ms: 100
  bad_tcp_latency_ms: 1000
  excellent_speed_kbps: 500
  bad_speed_kbps: 10

defaults:
  missing_tcp_score: 0.5
  missing_history_score: 0.5
  missing_fingerprint_score: 0.3
