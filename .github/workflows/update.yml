name: Update Nodes

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      top_n:
        description: 'verified.* 输出节点数(默认 100)'
        required: false
        default: '100'
      test_limit:
        description: '送入真测的最大节点数(默认 500)'
        required: false
        default: '500'
      audit:
        description: '同时跑订阅源审计'
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: update-nodes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Download sing-box
        run: |
          VERSION=$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
          VER_NUM="${VERSION#v}"
          curl -fsSL -o sb.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${VERSION}/sing-box-${VER_NUM}-linux-amd64.tar.gz"
          tar -xzf sb.tar.gz
          mv "sing-box-${VER_NUM}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box

      - name: Audit sources (optional)
        if: ${{ github.event.inputs.audit == 'true' }}
        run: |
          python tools/audit_sources.py --sources config/sources.yaml --output output/source_audit.json

      - name: Run pipeline
        run: |
          python main.py \
            --top-n "${{ github.event.inputs.top_n || '100' }}" \
            --test-limit "${{ github.event.inputs.test_limit || '500' }}"

      - name: Commit & push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git rm -f output/top.* 2>/dev/null || true
          git add output/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore: update nodes $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M CST')"
            git push
          fi

      - name: Purge jsDelivr cache
        run: |
          REPO="LeilaoMi/AutoMergePublicNodes-Optimized"
          for f in verified.txt verified.yaml verified.json verified.urls all.txt all.yaml all.json all.urls stats.json; do
            curl -s "https://purge.jsdelivr.net/gh/${REPO}@main/output/${f}" >/dev/null || true
          done
