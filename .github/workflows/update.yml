name: Update Nodes

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    paths:
      - 'core/**'
      - 'main.py'
      - 'config/**'
      - 'requirements.txt'
  workflow_dispatch:
    inputs:
      top_n:
        description: 'verified.* 输出节点数(默认 100)'
        required: false
        default: '100'
      test_limit:
        description: '送入真测的最大节点数(默认 500)'
        required: false
        default: '500'
      audit:
        description: '同时跑订阅源审计'
        type: boolean
        default: false
      force_push:
        description: '强制推送（忽略冲突）'
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: update-nodes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Get sing-box version
        id: sb-version
        run: |
          set -euo pipefail
          VERSION=$(curl -fsSL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Failed to fetch sing-box version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest sing-box: $VERSION"

      - name: Cache sing-box binary
        id: cache-sb
        uses: actions/cache@v4
        with:
          path: ./sing-box
          key: sing-box-${{ runner.os }}-${{ steps.sb-version.outputs.version }}

      - name: Download sing-box
        if: steps.cache-sb.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.sb-version.outputs.version }}"
          VER_NUM="${VERSION#v}"
          curl -fsSL -L -o sb.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${VERSION}/sing-box-${VER_NUM}-linux-amd64.tar.gz"
          tar -xzf sb.tar.gz
          mv "sing-box-${VER_NUM}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box

      - name: Audit sources
        run: |
          python tools/audit_sources.py --sources config/sources.yaml --output output/source_audit.json

      - name: Validate code
        run: |
          python -m compileall -q main.py core tools tests
          python -m unittest -v tests.test_regressions

      - name: Run pipeline
        run: |
          python main.py \
            --top-n "${{ github.event.inputs.top_n || '100' }}" \
            --test-limit "${{ github.event.inputs.test_limit || '500' }}" \
            --repo "${{ github.repository }}"

      - name: Build health report
        run: |
          python tools/health_report.py --output-dir output --verified-prefix verified --output output/health_report.json

      - name: Commit & push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git rm -f output/top.* 2>/dev/null || true
          git add output/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore: update nodes $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M CST')"
            for i in 1 2 3; do
              if [ "${{ github.event.inputs.force_push }}" = "true" ]; then
                git push --force-with-lease && break
              else
                git pull --rebase --autostash && git push && break
              fi
              if [ "$i" = "3" ]; then
                echo "::error::git push failed after 3 attempts"
                exit 1
              fi
              sleep 5
            done
          fi

      - name: Purge jsDelivr cache
        run: |
          REPO="${{ github.repository }}"
          for f in verified.txt verified.yaml verified.json verified.urls verified.converter.md all.txt all.yaml all.json all.urls all.converter.md stats.json source_audit.json health_report.json geo_cache.json; do
            curl -s "https://purge.jsdelivr.net/gh/${REPO}@main/output/${f}" >/dev/null || true
          done
