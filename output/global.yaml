  - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
tun:
  enable: true
  stack: system
  dns-hijack:
  - any:53
  auto-route: true
  auto-detect-interface: true
rules:
- GEOSITE,category-ads-all,REJECT
- GEOSITE,cn,DIRECT
- GEOIP,CN,DIRECT
- GEOSITE,geolocation-!cn,🚀 Proxy
- MATCH,🚀 Proxy
